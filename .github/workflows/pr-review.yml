name: PR Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || sudo apt-get install -y curl
          gh --version

      - name: Run reviewer subagent
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PROMPT=$(cat <<EOF
          Você vai revisar o PR #${PR_NUMBER}.

          1. Rode: gh pr view ${PR_NUMBER} --json title,body,author
          2. Rode: gh pr diff ${PR_NUMBER}
          3. Para cada arquivo alterado, leia o arquivo completo com Read.
          4. Invoque o subagent 'reviewer' passando o diff e o contexto.
          5. Retorne APENAS o bloco '=== REVIEW REPORT ===' do reviewer, sem comentários extras.
          EOF
          )

          claude -p "$PROMPT" \
            --permission-mode acceptEdits \
            --output-format text \
            > review.txt

          cat review.txt

          # Extrai decisão
          if grep -q "DECISION: REQUEST_CHANGES" review.txt; then
            echo "decision=request_changes" >> $GITHUB_OUTPUT
          else
            echo "decision=approve" >> $GITHUB_OUTPUT
          fi

      - name: Post review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(cat <<'MARKER'
          ## 🤖 Revisão automática (Claude Code)

          MARKER
          )
          BODY="${BODY}$(cat review.txt)"

          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Request changes if needed
        if: steps.review.outputs.decision == 'request_changes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" --request-changes \
            --body "Revisor automatizado detectou findings BLOCKER/MAJOR — veja o comentário acima."
          exit 1
