name: Docker Build e Push

on:
  push:
    branches: [ "main" ] # Dispara o build sempre que você der push na main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Substitua pelo endereço real do seu registry
          tags: 213.199.35.49:5000/crm-rh:latest
